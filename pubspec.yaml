name: booster_club
description: "High School Booster Club app — events, volunteering, sponsorships, donations, fundraising and more."
publish_to: 'none'
version: 1.11.0+25

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  csv: ^6.0.0

  # State management & routing
  provider: ^6.1.2
  go_router: ^14.2.7

  # UI / utilities
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  google_fonts: ^8.1.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.1
  shared_preferences: ^2.3.2
  cloud_functions: ^5.1.3
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
