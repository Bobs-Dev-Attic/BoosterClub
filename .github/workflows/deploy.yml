name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        # --no-tree-shake-icons ships the full Material icon font so no glyph can
        # be missing after an update (avoids blank/box icons from a stale cached
        # icon-font subset).
        run: flutter build web --release --no-tree-shake-icons

  deploy:
    # Auto-deploys Hosting AND Firestore/Storage security rules to Firebase on
    # every push to main — no local commands.
    # One-time setup: add a repo secret named FIREBASE_SERVICE_ACCOUNT containing
    # a Firebase service-account JSON key (Firebase console → Project settings →
    # Service accounts → Generate new private key). For the rules deploy the
    # service account also needs the "Firebase Rules Admin" and "Service Usage
    # Consumer" IAM roles on the project.
    #
    # NOTE: Cloud Functions are NOT deployed here (that needs the Blaze plan and
    # extra roles); deploy them manually with `firebase deploy --only functions`.
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Build web
        run: |
          flutter pub get
          flutter build web --release --no-tree-shake-icons

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: boosterclub-bda

      - name: Deploy Firestore & Storage rules
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write the service-account JSON via an env var (not inline) so special
          # characters can't break the shell, then authenticate the CLI with it.
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx --yes firebase-tools deploy \
            --only firestore:rules,storage \
            --project boosterclub-bda \
            --non-interactive
          rm -f "$RUNNER_TEMP/firebase-sa.json"
