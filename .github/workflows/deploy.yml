name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

  deploy:
    # Auto-deploys Hosting to Firebase on every push to main — no local commands.
    # One-time setup: add a repo secret named FIREBASE_SERVICE_ACCOUNT containing
    # a Firebase service-account JSON key (Firebase console → Project settings →
    # Service accounts → Generate new private key).
    #
    # NOTE: this deploys Hosting only. Deploying Firestore rules / Cloud Functions
    # from CI needs extra IAM roles on the service account (Firebase Rules Admin
    # + Service Usage Consumer, and for functions the Blaze plan); rules change
    # rarely and can be deployed manually with `firebase deploy --only firestore:rules`.
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Build web
        run: |
          flutter pub get
          flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: boosterclub-bda
