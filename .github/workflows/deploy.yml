name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        # --no-tree-shake-icons ships the full Material icon font so no glyph can
        # be missing after an update (avoids blank/box icons from a stale cached
        # icon-font subset).
        # --pwa-strategy=none disables the offline service worker so a new deploy
        # is always fetched fresh (with the no-cache Hosting headers) instead of
        # being served from the SW's Cache Storage until a second reload.
        run: flutter build web --release --no-tree-shake-icons --pwa-strategy=none

  deploy:
    # Auto-deploys Hosting AND Firestore/Storage security rules to Firebase on
    # every push to main — no local commands.
    # One-time setup: add a repo secret named FIREBASE_SERVICE_ACCOUNT containing
    # a Firebase service-account JSON key (Firebase console → Project settings →
    # Service accounts → Generate new private key). For the rules deploy the
    # service account also needs the "Firebase Rules Admin" and "Service Usage
    # Consumer" IAM roles on the project.
    #
    # NOTE: Cloud Functions are NOT deployed here (that needs the Blaze plan and
    # extra roles); deploy them manually with `firebase deploy --only functions`.
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Build web
        run: |
          flutter pub get
          flutter build web --release --no-tree-shake-icons --pwa-strategy=none

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: boosterclub-bda

      - name: Set up Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write the service-account JSON via an env var (not inline) so special
          # characters can't break the shell, then expose it to later steps.
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      # Firestore rules and Storage rules are deployed in SEPARATE steps on
      # purpose: `firebase deploy --only firestore:rules,storage` prepares all
      # targets before releasing any, so a failure preparing Storage (e.g. the
      # firebasestorage.defaultBucket.get permission) aborts the whole deploy and
      # the Firestore rules never ship. Splitting them lets the Firestore rules
      # (public Gallery/Legal reads, permission-gated writes) deploy on their own.
      - name: Deploy Firestore rules
        run: |
          npx --yes firebase-tools deploy --only firestore:rules \
            --project boosterclub-bda --non-interactive

      # Storage rules need the service account to have a Firebase Storage
      # permission (firebasestorage.defaultBucket.get — e.g. via roles/
      # firebase.admin). Until that IAM grant is in place this step fails, but it
      # must NOT block the workflow: Hosting and Firestore rules already shipped
      # above. Once the role is granted this turns green with no further changes.
      - name: Deploy Storage rules
        continue-on-error: true
        run: |
          npx --yes firebase-tools deploy --only storage \
            --project boosterclub-bda --non-interactive
