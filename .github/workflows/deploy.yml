name: Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

  deploy:
    # Auto-deploys to Firebase on every push to main — no local commands needed.
    # One-time setup: add a repo secret named FIREBASE_SERVICE_ACCOUNT containing
    # a Firebase service-account JSON key (Firebase console → Project settings →
    # Service accounts → Generate new private key).
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT: boosterclub-bda
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Build web
        run: |
          flutter pub get
          flutter build web --release

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account credentials
        run: |
          cat > "$RUNNER_TEMP/firebase-sa.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          JSON

      - name: Deploy hosting + Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        # Add ",functions" below once the project is on the Blaze plan.
        run: firebase deploy --only hosting,firestore:rules --project "$FIREBASE_PROJECT" --non-interactive
